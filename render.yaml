# Render blueprint — deploys the game as a static site.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: starfall-shrine-eclipse-bloom
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    # Cache the hashed JS bundle aggressively; index.html stays fresh.
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
